# Static site — no build step. Netlify serves the repo root directly.
# Pages render client-side via support.js, so there is nothing to compile.
[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://browser.sentry-cdn.com https://static.cloudflareinsights.com; connect-src 'self' https://docs.google.com https://*.sentry.io https://cloudflareinsights.com; frame-src 'self' https://maps.google.com; img-src 'self' data: https://maps.gstatic.com https://maps.googleapis.com; frame-ancestors 'none';"
    Cache-Control = "public, max-age=300, must-revalidate"

# Images are stable; cache them hard. (Rename the file if you ever swap an image.)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# support.js / products-data.js are NOT content-hashed, so they must revalidate
# often — otherwise a code change could be masked by a stale cached copy.
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"
